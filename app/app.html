<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SAS | Command</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #0a0a0a; color: #fff; }
    .hidden { display: none !important; }
    .login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #1a1a1a 0%, #0a0a0a 100%); }
    .login-card { background: #1a1a1a; border: 1px solid #333; padding: 3rem; border-radius: 8px; text-align: center; max-width: 400px; width: 90%; }
    .login-card h1 { font-size: 1.75rem; margin-bottom: 0.5rem; color: #dc2626; }
    .login-card p { color: #888; margin-bottom: 2rem; }
    .discord-btn { background: #5865F2; color: white; border: none; padding: 0.875rem 1.5rem; border-radius: 6px; font-size: 1rem; cursor: pointer; display: inline-flex; align-items: center; gap: 0.5rem; }
    .discord-btn:hover { background: #4752C4; }
    .app-nav { background: #141414; border-bottom: 1px solid #333; padding: 0 1rem; }
    .app-nav-container { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 60px; }
    .nav-tabs { display: flex; gap: 0.25rem; }
    .nav-tab { color: #888; text-decoration: none; padding: 0.5rem 1rem; font-size: 0.875rem; font-weight: 500; border-radius: 4px; transition: all 0.2s; cursor: pointer; }
    .nav-tab:hover, .nav-tab.active { color: #fff; background: #1a1a1a; }
    .user-pill { display: flex; align-items: center; gap: 0.75rem; background: #1a1a1a; padding: 0.375rem 0.875rem; border-radius: 20px; font-size: 0.875rem; }
    .user-avatar { width: 28px; height: 28px; border-radius: 50%; }
    .view { display: none; padding: 1.5rem; max-width: 1200px; margin: 0 auto; }
    .view.active { display: block; }
    .card { background: #141414; border: 1px solid #333; border-radius: 8px; padding: 1.5rem; margin-bottom: 1rem; }
    .card-title { font-size: 1.125rem; font-weight: 600; margin-bottom: 1rem; }
    .status-badge { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.5rem 1rem; border-radius: 20px; font-size: 0.875rem; font-weight: 600; }
    .status-Operational { background: #064e3b; color: #34d399; }
    .status-Standby { background: #713f12; color: #fbbf24; }
    .status-StandDown { background: #7f1d1d; color: #f87171; }
    .op-card { background: #0f0f0f; border: 1px solid #333; border-radius: 6px; padding: 1.25rem; margin-bottom: 1rem; }
    .op-title { font-size: 1.125rem; font-weight: 600; }
    .op-meta { color: #666; font-size: 0.875rem; }
    .empty-state { text-align: center; padding: 3rem; color: #666; }
    .toast { position: fixed; bottom: 1rem; right: 1rem; background: #dc2626; color: white; padding: 1rem 1.5rem; border-radius: 6px; transform: translateY(100px); opacity: 0; transition: all 0.3s; }
    .toast.show { transform: translateY(0); opacity: 1; }
    .announcement { background: #141414; border: 1px solid #333; border-radius: 6px; padding: 1.25rem; margin-bottom: 1rem; }
    .announcement.pinned { border-left: 3px solid #dc2626; }
    .announcement-header { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.75rem; }
    .announcement-avatar { width: 40px; height: 40px; border-radius: 50%; }
    .announcement-author { font-weight: 600; }
    .announcement-time { color: #666; font-size: 0.875rem; }
    .announcement-content { color: #ccc; line-height: 1.6; }
    .squadron-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 1rem; }
    .squadron-card { background: #141414; border: 1px solid #333; border-radius: 6px; padding: 1rem; }
    .squadron-callsign { font-size: 1.5rem; font-weight: 700; color: #dc2626; }
  </style>
</head>
<body>
  <div id="loginView" class="login-screen">
    <div class="login-card">
      <h1>SPECIAL AIR SERVICE</h1>
      <p>Command & Control System</p>
      <button class="discord-btn" onclick="auth.login()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg>
        Login with Discord
      </button>
      <p style="margin-top: 1.5rem; font-size: 0.75rem; color: #666;">SAS server membership required</p>
    </div>
  </div>

  <div id="mainApp" class="hidden">
    <nav class="app-nav">
      <div class="app-nav-container">
        <div class="nav-tabs">
          <a class="nav-tab active" onclick="app.switchView('dashboard')">Dashboard</a>
          <a class="nav-tab" onclick="app.switchView('operations')">Operations</a>
          <a class="nav-tab" onclick="app.switchView('squadrons')">Squadrons</a>
          <a class="nav-tab" onclick="app.switchView('announcements')">Announcements</a>
        </div>
        <div class="user-pill">
          <img src="" alt="" class="user-avatar" id="userAvatar">
          <span id="userName">...</span>
        </div>
      </div>
    </nav>

    <div id="dashboard" class="view active">
      <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
          <span id="unitStatusBadge" class="status-badge status-Operational">● Operational</span>
          <span style="color: #666; font-size: 0.875rem;">Updated: <span id="lastUpdated">--</span></span>
        </div>
        <h2 class="card-title">Unit Status</h2>
        <p id="unitStatusText" style="color: #ccc;">Loading...</p>
      </div>
      <div class="card">
        <h2 class="card-title">Active Operations</h2>
        <div id="activeOpsList"><div class="empty-state">Loading...</div></div>
      </div>
    </div>

    <div id="operations" class="view">
      <h2 style="margin-bottom: 1rem;">All Operations</h2>
      <div id="allOpsList"></div>
    </div>

    <div id="squadrons" class="view">
      <h2 style="margin-bottom: 1rem;">Squadrons</h2>
      <div id="squadronsList" class="squadron-grid"></div>
    </div>

    <div id="announcements" class="view">
      <h2 style="margin-bottom: 1rem;">Announcements</h2>
      <div id="announcementsList"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    // FIXED CONFIG - No more broken comments
    const CONFIG = {
      clientId: '1491725983131369552',
      redirectUri: window.location.origin + '/app/app.html', // Changed to app.html
      apiBase: window.location.origin + '/api'
    };

    const auth = {
      user: null,

      login() {
        const encoded = encodeURIComponent(CONFIG.redirectUri);
        window.location.href = `https://discord.com/oauth2/authorize?client_id=${CONFIG.clientId}&response_type=code&redirect_uri=${encoded}&scope=identify%20guilds.members.read&prompt=consent`;
      },

      async init() {
        // Check for OAuth callback FIRST
        const params = new URLSearchParams(window.location.search);
        const code = params.get('code');
        const error = params.get('error');

        if (error) {
          showToast('Login cancelled');
          document.getElementById('loginView').classList.remove('hidden');
          return;
        }

        if (code) {
          // Remove code from URL immediately
          window.history.replaceState({}, document.title, window.location.pathname);
          await this.handleCallback(code);
          return;
        }

        // Then check existing session
        const stored = localStorage.getItem('sas_session');
        if (stored) {
          try {
            const session = JSON.parse(stored);
            if (session.expires > Date.now()) {
              this.user = session.user;
              app.init();
              return;
            } else {
              localStorage.removeItem('sas_session');
            }
          } catch (e) {
            localStorage.removeItem('sas_session');
          }
        }

        // Show login if nothing else
        document.getElementById('loginView').classList.remove('hidden');
      },

      async handleCallback(code) {
        try {
          showToast('Logging in...');
          
          const res = await fetch(`${CONFIG.apiBase}/discord/callback`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
              code: code, 
              redirectUri: CONFIG.redirectUri 
            })
          });
          
          if (!res.ok) {
            const err = await res.json();
            throw new Error(err.error || 'Auth failed');
          }
          
          const data = await res.json();
          
          // Check if approved personnel
          const checkRes = await fetch(`${CONFIG.apiBase}/auth/check?userId=${data.id}`);
          const checkData = await checkRes.json();
          
          if (!checkData.approved) {
            showToast('Access denied. Apply via Discord first.');
            document.getElementById('loginView').classList.remove('hidden');
            return;
          }
          
          this.user = {
            id: data.id,
            username: data.username,
            nickname: data.nickname || data.username,
            avatar: data.avatar,
            isAdmin: checkData.isAdmin,
            rank: checkData.rank,
            squadron: checkData.squadron
          };
          
          localStorage.setItem('sas_session', JSON.stringify({
            user: this.user,
            expires: Date.now() + (7 * 24 * 60 * 60 * 1000)
          }));
          
          app.init();
          
        } catch (err) {
          console.error(err);
          showToast('Login failed: ' + err.message);
          document.getElementById('loginView').classList.remove('hidden');
        }
      },

      logout() {
        localStorage.removeItem('sas_session');
        window.location.reload();
      }
    };

    const app = {
      init() {
        document.getElementById('loginView').classList.add('hidden');
        document.getElementById('mainApp').classList.remove('hidden');
        
        const displayName = auth.user.nickname || auth.user.username;
        document.getElementById('userName').textContent = `${auth.user.rank || 'Member'} ${displayName}`;
        document.getElementById('userAvatar').src = auth.user.avatar 
          ? `https://cdn.discordapp.com/avatars/${auth.user.id}/${auth.user.avatar}.png`
          : 'https://cdn.discordapp.com/embed/avatars/0.png';

        this.loadUnitStatus();
        this.loadOperations();
        this.loadSquadrons();
        this.loadAnnouncements();
      },

      switchView(viewId) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(viewId).classList.add('active');
        document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
        event.target.classList.add('active');
      },

      async loadUnitStatus() {
        try {
          const res = await fetch(`${CONFIG.apiBase}/unit/status`);
          const data = await res.json();
          const statusClass = data.status.replace(' ', '');
          document.getElementById('unitStatusBadge').className = `status-badge status-${statusClass}`;
          document.getElementById('unitStatusBadge').textContent = `● ${data.status}`;
          document.getElementById('unitStatusText').textContent = data.message;
          document.getElementById('lastUpdated').textContent = new Date(data.updatedAt).toLocaleString();
        } catch (err) {
          document.getElementById('unitStatusText').textContent = 'Failed to load status';
        }
      },

      async loadOperations() {
        try {
          const res = await fetch(`${CONFIG.apiBase}/operations/active`);
          const ops = await res.json();
          
          const html = ops.length ? ops.map(op => `
            <div class="op-card">
              <div style="display: flex; justify-content: space-between; align-items: start;">
                <div>
                  <div class="op-title">${op.name}</div>
                  <div class="op-meta">${op.squadron_callsign || 'N/A'} • ${op.type} • ${op.status}</div>
                </div>
              </div>
              <p style="color: #888; margin-top: 0.5rem;">${op.description}</p>
            </div>
          `).join('') : '<div class="empty-state">No active operations</div>';
          
          document.getElementById('activeOpsList').innerHTML = html;
          document.getElementById('allOpsList').innerHTML = html;
        } catch (err) {
          document.getElementById('activeOpsList').innerHTML = '<div class="empty-state">Error loading operations</div>';
        }
      },

      async loadSquadrons() {
        try {
          const res = await fetch(`${CONFIG.apiBase}/squadrons`);
          const squadrons = await res.json();
          
          document.getElementById('squadronsList').innerHTML = squadrons.map(sq => `
            <div class="squadron-card">
              <div class="squadron-callsign">${sq.callsign}</div>
              <div style="font-size: 1.125rem; margin-bottom: 0.5rem;">${sq.name}</div>
              <div style="color: #666; font-size: 0.875rem;">Leader: ${sq.leader_name || 'None'}</div>
            </div>
          `).join('');
        } catch (err) {
          document.getElementById('squadronsList').innerHTML = '<div class="empty-state">Error loading squadrons</div>';
        }
      },

      async loadAnnouncements() {
        try {
          const res = await fetch(`${CONFIG.apiBase}/announcements`);
          const data = await res.json();
          
          document.getElementById('announcementsList').innerHTML = data.announcements.map(a => `
            <div class="announcement ${a.pinned ? 'pinned' : ''}">
              <div class="announcement-header">
                <img src="https://cdn.discordapp.com/embed/avatars/0.png" class="announcement-avatar">
                <div>
                  <div class="announcement-author">${a.author_name}</div>
                  <div class="announcement-time">${new Date(a.created_at).toLocaleString()}</div>
                </div>
              </div>
              <div class="announcement-content">${a.content}</div>
            </div>
          `).join('');
        } catch (err) {
          document.getElementById('announcementsList').innerHTML = '<div class="empty-state">Error loading announcements</div>';
        }
      }
    };

    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    // Start
    auth.init();
  </script>
</body>
</html>
